<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Darula Admin | Terminal-Steuerung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e2e8f0; }
        .admin-card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.3s ease; }
        .admin-card:hover { border-color: #333; background: #0f0f0f; }
        .status-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        @media print { 
            .no-print { display: none !important; } 
            body { background: white; color: black; }
            .admin-card { border: 1px solid #000; background: white; color: black; margin-bottom: 10px; page-break-inside: avoid; }
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginOverlay" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-[#0a0a0a] border border-[#1a1a1a] p-10 rounded-sm shadow-2xl">
            <div class="text-center mb-10">
                <h1 class="text-xl font-800 tracking-[0.3em] uppercase italic">Darula <span class="text-gray-600 font-400">Admin</span></h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-2">Sicherheitsüberprüfung</p>
            </div>
            <input type="password" id="adminPass" placeholder="PASSWORT" class="w-full bg-black border border-[#222] p-4 rounded-none mb-6 text-center font-bold tracking-widest focus:border-white outline-none transition text-white">
            <button onclick="checkPass()" class="w-full bg-white text-black py-4 font-800 uppercase text-xs tracking-[0.2em] hover:bg-gray-200 transition">Terminal starten</button>
        </div>
    </div>

    <div id="adminContent" class="hidden">
        <header class="border-b border-[#1a1a1a] bg-black sticky top-0 z-50 no-print">
            <div class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-2 h-2 bg-green-500 rounded-full status-dot"></div>
                    <h1 class="text-sm font-800 uppercase tracking-[0.3em]">Live-Terminal <span class="text-gray-600">2026</span></h1>
                </div>
                <div class="flex gap-4">
                    <button onclick="refreshData()" class="text-[10px] font-bold uppercase tracking-widest border border-[#222] px-4 py-2 hover:bg-[#111]">Aktualisieren</button>
                    <button onclick="window.print()" class="text-[10px] font-bold uppercase tracking-widest bg-white text-black px-6 py-2 hover:bg-gray-200">Drucken</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 py-12">
            <div class="mb-12 flex justify-between items-end border-b border-[#1a1a1a] pb-6">
                <h2 class="text-xs font-800 uppercase tracking-[0.4em] text-gray-500">Eingangs-Logistik / Avisierungen</h2>
                <div id="countLabel" class="text-[10px] font-bold text-gray-700 uppercase tracking-widest">0 Einträge geladen</div>
            </div>

            <div id="masterList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </main>
    </div>

    <script>
        const supabaseUrl = 'https://navhxyadbifllpopumfz.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdmh4eWFkYmlmbGxwb3B1bWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzYyNTIsImV4cCI6MjA4NzcxMjI1Mn0.-0uTAYMdR5rdXvlVpIdPqmMLqsv1Men1wnBfAx-Q6zY';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function checkPass() {
            if(document.getElementById('adminPass').value === "Darula2024") {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                refreshData();
            } else { alert("Zutritt verweigert."); }
        }

        async function deleteEntry(id) {
            if(confirm("Eintrag endgültig löschen?")) {
                const { error } = await _supabase.from('avisierung').delete().eq('id', id);
                if (error) alert("Fehler beim Löschen");
                refreshData();
            }
        }

        async function refreshData() {
            const { data, error } = await _supabase.from('avisierung').select('*').order('liefer_datum', { ascending: true });
            
            const list = document.getElementById('masterList');
            const countLabel = document.getElementById('countLabel');
            list.innerHTML = '';

            if (data) {
                countLabel.innerText = `${data.length} Avisierungen aktiv`;
                data.forEach(item => {
                    const isBigLoad = item.palettes >= 20;
                    const card = `
                        <div class="admin-card p-6 flex flex-col justify-between">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <p class="text-[10px] font-bold text-gray-600 uppercase tracking-widest mb-1">${item.liefer_datum}</p>
                                    <h3 class="text-lg font-800 uppercase italic tracking-tight text-white">${item.firma}</h3>
                                </div>
                                <button onclick="deleteEntry(${item.id})" class="no-print text-[9px] font-bold text-red-900 hover:text-red-500 uppercase tracking-tighter border border-red-900/30 px-2 py-1 transition">Löschen</button>
                            </div>
                            
                            <div class="space-y-2 mb-6">
                                <div class="flex justify-between text-[10px] uppercase tracking-widest border-b border-[#1a1a1a] pb-2 text-gray-500">
                                    <span>Art-Nr:</span> <span class="text-gray-200 font-bold">${item.artikel_nr}</span>
                                </div>
                                <div class="flex justify-between text-[10px] uppercase tracking-widest border-b border-[#1a1a1a] pb-2 text-gray-500">
                                    <span>BE-Nr:</span> <span class="text-gray-200 font-bold">${item.be_nummer}</span>
                                </div>
                            </div>

                            <div class="flex items-center justify-between mt-auto">
                                <div class="text-[10px] font-bold uppercase tracking-[0.2em] ${isBigLoad ? 'text-white' : 'text-gray-600'}">
                                    ${isBigLoad ? '🚛 SATTELZUG' : '🚚 KLEIN-LKW'}
                                </div>
                                <div class="text-2xl font-800 text-white">${item.palettes} <span class="text-[10px] text-gray-600 uppercase tracking-widest ml-1 font-bold">PAL</span></div>
                            </div>
                        </div>
                    `;
                    list.innerHTML += card;
                });
            }
        }

        // Auto-Refresh alle 60 Sekunden
        setInterval(refreshData, 60000);
    </script>
</body>
</html>
