<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Darula Admin | Debug & Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-3xl mx-auto">
        <div class="bg-white p-6 rounded-xl shadow-md mb-6 flex justify-between items-center border-b-4 border-blue-600">
            <h1 class="font-black italic text-xl uppercase">Darula <span class="text-blue-600">Terminal</span></h1>
            <button onclick="load()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase hover:bg-blue-600 transition-all">Refresh</button>
        </div>

        <div id="status" class="mb-4 text-center text-xs font-bold uppercase tracking-widest text-slate-400">Verbinde...</div>
        <div id="liste" class="space-y-3"></div>
    </div>

    <script>
        // DEINE ZUGANGSDATEN
        const SB_URL = "https://navhxyadbifllpopumfz.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdmh4eWFkYmlmbGxwb3B1bWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzYyNTIsImV4cCI6MjA4NzcxMjI1Mn0.-0uTAYMdR5rdXvlVpIdPqmMLqsv1Men1wnBfAx-Q6zY";
        
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        async function load() {
            document.getElementById('status').innerText = "Lade Daten...";
            const { data, error } = await _sb.from('avisierung').select('*').order('id', {ascending: false});
            
            if(error) {
                document.getElementById('status').innerHTML = `<span class="text-red-500 font-black italic underline">FEHLER: ${error.message}</span>`;
                return;
            }

            document.getElementById('status').innerText = `${data.length} LKWs gefunden`;
            const container = document.getElementById('liste');
            container.innerHTML = '';
            
            data.forEach(item => {
                const isDone = item.status === 'abgewickelt';
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center ${isDone ? 'opacity-50 grayscale' : ''}">
                        <div>
                            <div class="font-bold text-slate-800 uppercase tracking-tight">${item.firma || 'Keine Firma'}</div>
                            <div class="text-[10px] text-slate-400 font-bold">ID: ${item.id} | BE: ${item.be_nummer || '-'}</div>
                        </div>
                        <div class="flex gap-2">
                            ${!isDone ? `
                                <button onclick="handleUpdate(${item.id})" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase hover:scale-105 transition-all">Abwickeln</button>
                            ` : '<span class="text-green-600 font-black text-[10px] uppercase p-2 tracking-widest">Done</span>'}
                            
                            <button onclick="handleDelete(${item.id})" class="bg-red-50 text-red-500 p-2 rounded-lg hover:bg-red-500 hover:text-white transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>`;
            });
        }

        async function handleUpdate(id) {
            console.log("Update wird gestartet für ID:", id);
            const { error } = await _sb.from('avisierung').update({ status: 'abgewickelt' }).eq('id', id);
            
            if(error) {
                alert("UPDATE BLOCKIERT: " + error.message);
            } else {
                load();
            }
        }

        async function handleDelete(id) {
            if(!confirm("Wirklich löschen?")) return;
            console.log("Löschbefehl gesendet für ID:", id);
            const { error } = await _sb.from('avisierung').delete().eq('id', id);
            
            if(error) {
                alert("LÖSCHEN BLOCKIERT: " + error.message);
            } else {
                load();
            }
        }

        // Start beim Laden
        load();
    </script>
</body>
</html>
