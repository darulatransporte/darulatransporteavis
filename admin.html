<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darula Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        .admin-card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; border-bottom: 8px solid #1e293b; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        .login-overlay { background: #0f172a; position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .truck-row { border-left: 6px solid transparent; transition: all 0.2s; border-bottom: 1px solid #f1f5f9; }
        .truck-row:hover { border-left-color: #2563eb; background: #f8fafc; }
        .week-header { background: #1e293b; color: white; padding: 16px 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
        .past-entry { opacity: 0.5; filter: grayscale(1); }
        .today-pulse { animation: pulse 2s infinite; border-left-color: #2563eb; background: #eff6ff; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .hidden { display: none !important; }
        .stat-badge { background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 99px; font-size: 10px; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <div id="loginPanel" class="login-overlay">
        <div class="max-w-md w-full p-10 bg-white rounded-[2.5rem] shadow-2xl border-b-8 border-blue-600 mx-4 text-center">
            <h2 class="text-4xl font-900 uppercase italic tracking-tighter text-slate-900 leading-none mb-8">Admin<br><span class="text-blue-600">Terminal</span></h2>
            <input type="password" id="passInput" placeholder="Passwort" class="w-full p-5 bg-slate-100 border-2 border-transparent focus:border-blue-600 rounded-2xl font-bold focus:outline-none text-center text-xl mb-4 transition-all">
            <button onclick="checkLogin()" class="w-full bg-blue-600 hover:bg-slate-900 text-white font-900 uppercase py-5 rounded-2xl text-[10px] tracking-[0.3em] transition-all shadow-lg active:scale-95">Terminal Entsperren</button>
            <p id="errorMsg" class="text-red-600 text-[10px] font-black uppercase mt-4 hidden">Zugriff verweigert</p>
        </div>
    </div>

    <div id="mainContent" class="hidden flex-col min-h-screen">
        <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <h1 class="text-2xl font-900 tracking-tighter uppercase italic text-slate-900">Darula <span class="text-blue-600">Logistics</span></h1>
                </div>
                <div class="flex items-center gap-4">
                    <input type="text" id="searchInput" onkeyup="filterList()" placeholder="Suche Firma / BE..." class="hidden md:block bg-slate-100 border-none rounded-xl px-4 py-2 text-xs font-bold focus:ring-2 focus:ring-blue-600 outline-none w-64">
                    <button onclick="location.reload()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-[10px] font-900 uppercase tracking-widest hover:bg-red-600 hover:text-white transition-all">Logout</button>
                </div>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-4 py-10 w-full flex-grow">
            <div class="flex flex-col md:flex-row justify-between items-end mb-8 gap-6">
                <div>
                    <span class="text-blue-600 font-900 text-[10px] uppercase tracking-[0.4em] bg-blue-50 px-3 py-1 rounded">Logistics Terminal V3</span>
                    <h2 class="text-5xl font-900 uppercase italic tracking-tighter text-slate-900 mt-2 leading-tight">Lieferplan</h2>
                </div>
                <div class="flex gap-3">
                    <button onclick="loadList()" class="bg-white border border-slate-200 text-slate-900 px-6 py-4 rounded-xl text-[10px] font-900 uppercase tracking-widest hover:bg-slate-50 transition-all shadow-sm">Sync</button>
                </div>
            </div>

            <div class="admin-card">
                <div id="truckList">
                    <div class="p-20 text-center text-slate-400 font-bold uppercase italic tracking-widest">Initialisiere Kalenderdaten...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const _sb = supabase.createClient(
            "https://navhxyadbifllpopumfz.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdmh4eWFkYmlmbGxwb3B1bWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzYyNTIsImV4cCI6MjA4NzcxMjI1Mn0.-0uTAYMdR5rdXvlVpIdPqmMLqsv1Men1wnBfAx-Q6zY"
        );

        let allData = [];

        function checkLogin() {
            if (document.getElementById('passInput').value === "alurad2026") {
                document.getElementById('loginPanel').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                loadList();
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        }

        async function loadList() {
            const container = document.getElementById('truckList');
            const { data, error } = await _sb.from('avisierung').select('*');

            if (error) {
                container.innerHTML = `<div class="p-10 text-red-500 font-bold text-center">Fehler: ${error.message}</div>`;
                return;
            }

            allData = data;
            renderList(allData);
        }

        function renderList(data) {
            const container = document.getElementById('truckList');
            container.innerHTML = '';
            
            const today = new Date();
            today.setHours(0,0,0,0);

            // Sortierung: Zukünftige zuerst, dann nach Datum absteigend
            data.sort((a, b) => new Date(b.liefer_datum) - new Date(a.liefer_datum));

            // Gruppierung nach Wochen
            const groups = {};
            data.forEach(item => {
                const d = new Date(item.liefer_datum);
                const kw = getWeekNumber(d);
                const year = d.getFullYear();
                const key = `KW ${kw} / ${year}`;
                if (!groups[key]) groups[key] = { items: [], totalPalettes: 0 };
                groups[key].items.push(item);
                groups[key].totalPalettes += parseInt(item.palettes || 0);
            });

            for (const [weekLabel, group] of Object.entries(groups)) {
                container.innerHTML += `
                    <div class="week-header">
                        <span>${weekLabel}</span>
                        <div class="flex gap-4">
                            <span class="stat-badge">${group.items.length} LKW</span>
                            <span class="stat-badge text-blue-400">${group.totalPalettes} Paletten gesamt</span>
                        </div>
                    </div>`;
                
                group.items.forEach(item => {
                    const lDate = new Date(item.liefer_datum);
                    const isPast = lDate < today;
                    const isToday = lDate.getTime() === today.getTime();
                    
                    const formattedDate = lDate.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit' });

                    container.innerHTML += `
                        <div class="truck-row p-6 md:p-8 grid grid-cols-1 md:grid-cols-12 gap-4 items-center ${isPast ? 'past-entry' : ''} ${isToday ? 'today-pulse' : ''}" data-search="${item.firma} ${item.be_nummer}">
                            <div class="md:col-span-4">
                                <div class="flex items-center gap-3">
                                    <div class="font-900 text-slate-900 uppercase text-2xl italic tracking-tighter leading-none">${item.firma || 'UNBEKANNT'}</div>
                                    ${isToday ? '<span class="bg-blue-600 text-white text-[8px] font-black px-2 py-1 rounded uppercase tracking-widest">Heute</span>' : ''}
                                </div>
                                <div class="flex flex-wrap gap-2 mt-3">
                                    <span class="text-[8px] font-black bg-slate-100 text-slate-500 px-2 py-1 rounded uppercase tracking-widest">${item.fahrzeug_typ || 'LKW'}</span>
                                    <span class="text-[8px] font-black bg-blue-50 text-blue-600 px-2 py-1 rounded uppercase tracking-widest">Art: ${item.artikel_nr || '-'}</span>
                                    <span class="text-[8px] font-black bg-orange-50 text-orange-600 px-2 py-1 rounded uppercase tracking-widest">${item.palettes || 0} Pal.</span>
                                </div>
                            </div>
                            
                            <div class="md:col-span-3">
                                <div class="text-[9px] font-black text-slate-400 uppercase mb-1 tracking-widest">BE-Nummer</div>
                                <span class="font-mono font-bold text-slate-700 bg-slate-50 px-3 py-1 rounded-lg border border-slate-100">${item.be_nummer || '---'}</span>
                            </div>

                            <div class="md:col-span-3">
                                <div class="text-[9px] font-black text-slate-400 uppercase mb-1 tracking-widest">Liefertermin</div>
                                <span class="font-900 text-xl italic tracking-tighter ${isToday ? 'text-blue-600' : 'text-slate-900'}">${formattedDate}</span>
                            </div>

                            <div class="md:col-span-2 flex justify-end gap-2">
                                <button onclick="deleteTruck(${item.id})" class="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white p-3 rounded-xl transition-all shadow-sm">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewbox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        function filterList() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('.truck-row');
            rows.forEach(row => {
                const text = row.getAttribute('data-search').toLowerCase();
                row.style.display = text.includes(val) ? '' : 'none';
            });
        }

        async function deleteTruck(id) {
            if (!confirm("Eintrag löschen?")) return;
            const { error } = await _sb.from('avisierung').delete().eq('id', id);
            if (error) alert(error.message);
            else loadList();
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        document.getElementById('passInput').addEventListener('keydown', (e) => { if(e.key === 'Enter') checkLogin(); });
    </script>
</body>
</html>
