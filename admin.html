<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darula Logistik | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --darula-blue: #2563eb; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .tab-active { border-bottom: 4px solid var(--darula-blue); color: var(--darula-blue); font-weight: 900; }
        .hidden-content { display: none; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="antialiased min-h-screen">

    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-[200] flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center">
            <div class="bg-blue-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center font-900 italic mx-auto mb-6 shadow-lg shadow-blue-500/30 text-2xl">D</div>
            <h2 class="text-2xl font-900 uppercase italic tracking-tighter mb-2">Login</h2>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-8 italic">Zentrale Darula Logistik</p>
            <input type="password" id="admin-pw" placeholder="Passwort" class="w-full p-4 bg-slate-100 border-2 border-transparent focus:border-blue-600 rounded-2xl outline-none font-bold text-center mb-4 transition-all italic">
            <button onclick="checkAccess()" class="w-full bg-blue-600 hover:bg-slate-900 text-white py-4 rounded-2xl font-900 uppercase italic transition-all shadow-lg active:scale-95">Anmelden</button>
            <p id="error-msg" class="text-red-500 text-[10px] font-black uppercase mt-4 hidden">Zugriff verweigert</p>
        </div>
    </div>

    <div id="admin-content" class="hidden-content">
        
        <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
            <div class="max-w-[1600px] mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-10">
                    <span class="text-xl font-900 tracking-tighter uppercase italic">Darula <span class="text-blue-600">Admin</span></span>
                    <nav class="hidden md:flex gap-8 text-[11px] font-900 uppercase tracking-widest italic">
                        <button onclick="switchTab('today')" id="tab-today" class="py-2 tab-active transition-all">Ankunft Heute</button>
                        <button onclick="switchTab('upcoming')" id="tab-upcoming" class="py-2 text-slate-400 hover:text-blue-600 transition-all">Planung</button>
                        <button onclick="switchTab('partners')" id="tab-partners" class="py-2 text-slate-400 hover:text-blue-600 transition-all">Partner-Netzwerk</button>
                        <button onclick="switchTab('all')" id="tab-all" class="py-2 text-slate-400 hover:text-blue-600 transition-all">Archiv</button>
                    </nav>
                </div>
                <div class="flex gap-4 items-center">
                    <button onclick="fetchData()" class="p-2.5 bg-slate-100 rounded-xl hover:bg-blue-600 hover:text-white transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                    </button>
                    <button onclick="logout()" class="text-[10px] font-black uppercase bg-slate-900 text-white px-5 py-2.5 rounded-xl hover:bg-red-600 transition-all italic">Logout</button>
                </div>
            </div>
        </header>

        <main class="max-w-[1600px] mx-auto px-6 py-8">
            
            <div id="stats-bar" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                    <p class="text-[10px] font-900 uppercase text-slate-400 mb-2 italic">Ladevorgänge Heute</p>
                    <div class="flex items-end gap-2 text-slate-900">
                        <span id="stat-count" class="text-4xl font-900 italic tracking-tighter">0</span>
                        <span class="text-xs font-bold opacity-40 mb-1.5 uppercase tracking-widest">LKW</span>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                    <p class="text-[10px] font-900 uppercase text-slate-400 mb-2 italic">Paletten-Umschlag</p>
                    <div class="flex items-end gap-2 text-blue-600">
                        <span id="stat-pal" class="text-4xl font-900 italic tracking-tighter">0</span>
                        <span class="text-xs font-bold opacity-60 mb-1.5 uppercase tracking-widest">Einheiten</span>
                    </div>
                </div>
                <div class="md:col-span-2 bg-blue-600 rounded-[2rem] p-6 text-white flex items-center justify-between shadow-lg shadow-blue-200">
                    <div>
                        <h4 class="text-2xl font-900 uppercase italic tracking-tighter" id="view-title">Ankunft Heute</h4>
                        <p class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-80" id="view-date">26. MÄRZ 2026</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] font-black uppercase tracking-widest opacity-60">System-Status</p>
                        <p class="text-xs font-bold italic">Live-Übertragung Aktiv</p>
                    </div>
                </div>
            </div>

            <div id="partner-actions" class="hidden flex justify-between items-center mb-6">
                <h3 class="text-xl font-900 uppercase italic tracking-tighter">Partner-Datenbank</h3>
                <button onclick="addNewPartner()" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-900 uppercase italic text-[10px] tracking-widest hover:bg-blue-600 transition-all shadow-xl">+ Partner hinzufügen</button>
            </div>

            <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left" id="main-table">
                        <thead id="table-head">
                            </thead>
                        <tbody id="table-body" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
                <div id="no-data" class="hidden py-24 text-center">
                    <p class="text-slate-300 font-900 uppercase italic tracking-widest text-sm">Keine Datensätze gefunden</p>
                </div>
            </div>
        </main>
    </div>

<script>
    const MASTER_PW = "Sommer2026";
    const SB_URL = "https://navhxyadbifllpopumfz.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdmh4eWFkYmlmbGxwb3B1bWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzYyNTIsImV4cCI6MjA4NzcxMjI1Mn0.-0uTAYMdR5rdXvlVpIdPqmMLqsv1Men1wnBfAx-Q6zY";
    const _sb = supabase.createClient(SB_URL, SB_KEY);

    let currentTab = 'today';
    let avisData = [];
    let partnerData = [];

    // AUTH
    function checkAccess() {
        if(document.getElementById('admin-pw').value === MASTER_PW) {
            sessionStorage.setItem('darula_admin_auth', 'true');
            unlockUI();
        } else {
            document.getElementById('error-msg').classList.remove('hidden');
        }
    }
    function unlockUI() {
        document.getElementById('login-overlay').classList.add('hidden');
        document.getElementById('admin-content').classList.remove('hidden-content');
        document.getElementById('view-date').innerText = new Date().toLocaleDateString('de-DE', {day:'2-digit', month:'long', year:'numeric'}).toUpperCase();
        fetchData();
    }
    function logout() { sessionStorage.clear(); location.reload(); }
    if(sessionStorage.getItem('darula_admin_auth') === 'true') unlockUI();

    // DATA FETCHING
    async function fetchData() {
        const { data: avis, error: e1 } = await _sb.from('avisierung').select('*').order('liefer_datum', { ascending: true });
        const { data: partners, error: e2 } = await _sb.from('lieferanten').select('*').order('name', { ascending: true });
        
        avisData = avis || [];
        partnerData = partners || [];
        render();
    }

    // TABS
    function switchTab(t) {
        currentTab = t;
        const tabs = ['today', 'upcoming', 'partners', 'all'];
        tabs.forEach(tab => document.getElementById('tab-' + tab).className = (tab === t) ? "py-2 tab-active transition-all" : "py-2 text-slate-400 hover:text-blue-600 transition-all");
        
        document.getElementById('partner-actions').classList.toggle('hidden', t !== 'partners');
        document.getElementById('stats-bar').classList.toggle('hidden', t === 'partners');
        
        const titles = { today: 'Ankunft Heute', upcoming: 'Planung / Vorschau', partners: 'Partner-Management', all: 'Archiv Gesamt' };
        document.getElementById('view-title').innerText = titles[t];
        render();
    }

    function render() {
        const head = document.getElementById('table-head');
        const body = document.getElementById('table-body');
        const empty = document.getElementById('no-data');
        body.innerHTML = '';
        empty.classList.add('hidden');

        if(currentTab === 'partners') {
            head.innerHTML = `<tr class="bg-slate-50 text-[10px] font-900 uppercase tracking-widest text-slate-400 italic">
                <th class="px-8 py-6">Partner Code</th><th class="px-8 py-6">Name der Spedition</th>
                <th class="px-8 py-6 text-center">Zuverlässigkeit</th><th class="px-8 py-6">Sonderregelung</th><th class="px-8 py-6 text-right">Optionen</th>
            </tr>`;
            
            partnerData.forEach(p => {
                const reliabilityColor = p.zuverlaessigkeit > 80 ? 'text-emerald-500' : (p.zuverlaessigkeit > 50 ? 'text-amber-500' : 'text-red-500');
                body.innerHTML += `
                <tr class="hover:bg-slate-50 transition-all group">
                    <td class="px-8 py-6 font-900 italic text-blue-600">${p.code || '---'}</td>
                    <td class="px-8 py-6 font-900 uppercase italic text-sm text-slate-800">${p.name}</td>
                    <td class="px-8 py-6 text-center">
                        <div class="flex items-center justify-center gap-2">
                            <span class="text-lg font-900 ${reliabilityColor}">${p.zuverlaessigkeit}%</span>
                            <div class="flex flex-col gap-0.5">
                                <button onclick="rankPartner('${p.id}', 10)" class="text-[8px] hover:text-blue-600">▲</button>
                                <button onclick="rankPartner('${p.id}', -10)" class="text-[8px] hover:text-red-600">▼</button>
                            </div>
                        </div>
                    </td>
                    <td class="px-8 py-6">
                        <input onblur="updateRegelung('${p.id}', this.value)" value="${p.regelung || ''}" placeholder="Keine Regelung..." class="bg-slate-100 border-none rounded-lg px-4 py-2 text-[11px] font-bold w-full italic">
                    </td>
                    <td class="px-8 py-6 text-right">
                        <button onclick="deletePartner('${p.id}')" class="text-slate-300 hover:text-red-500 transition-all italic font-black text-xs">LÖSCHEN</button>
                    </td>
                </tr>`;
            });
        } else {
            // AVISIERUNGEN RENDERN
            head.innerHTML = `<tr class="bg-slate-50 text-[10px] font-900 uppercase tracking-widest text-slate-400 italic">
                <th class="px-8 py-6">ETA / Typ</th><th class="px-8 py-6">Partner</th>
                <th class="px-8 py-6 text-center">Paletten</th><th class="px-8 py-6">Referenz</th><th class="px-8 py-6 text-right">Aktion</th>
            </tr>`;
            
            const today = new Date().toISOString().split('T')[0];
            let filtered = avisData;
            if(currentTab === 'today') filtered = avisData.filter(r => r.liefer_datum === today);
            if(currentTab === 'upcoming') filtered = avisData.filter(r => r.liefer_datum > today);

            document.getElementById('stat-count').innerText = avisData.filter(r => r.liefer_datum === today).length;
            document.getElementById('stat-pal').innerText = avisData.filter(r => r.liefer_datum === today).reduce((s, r) => s + (parseInt(r.palettes)||0), 0);

            if(filtered.length === 0) empty.classList.remove('hidden');

            filtered.forEach(r => {
                body.innerHTML += `
                <tr class="hover:bg-slate-50 transition-all">
                    <td class="px-8 py-6">
                        <div class="font-900 italic text-lg ${r.liefer_datum === today ? 'text-blue-600' : 'text-slate-900'}">${new Date(r.liefer_datum).toLocaleDateString('de-DE')}</div>
                        <div class="text-[9px] font-black uppercase text-slate-400 tracking-widest italic">${r.fahrzeug_typ}</div>
                    </td>
                    <td class="px-8 py-6 font-900 uppercase italic text-sm text-slate-800">${r.firma}</td>
                    <td class="px-8 py-6 text-center font-900 italic bg-slate-50/50">${r.palettes}</td>
                    <td class="px-8 py-6">
                        <div class="text-[10px] font-bold text-slate-400 uppercase">BE: <span class="text-slate-900">${r.be_nummer}</span></div>
                    </td>
                    <td class="px-8 py-6 text-right">
                        <button onclick="deleteAvis('${r.id}')" class="text-slate-300 hover:text-red-500 transition-all font-black text-xs uppercase italic">Löschen</button>
                    </td>
                </tr>`;
            });
        }
    }

    // PARTNER ACTIONS
    async function addNewPartner() {
        const name = prompt("Name der Spedition:");
        if(!name) return;
        const code = "DAR-" + Math.floor(100 + Math.random() * 900);
        await _sb.from('lieferanten').insert([{ name, code, zuverlaessigkeit: 100, regelung: '' }]);
        fetchData();
    }

    async function rankPartner(id, val) {
        const p = partnerData.find(x => x.id == id);
        let n = Math.min(Math.max((p.zuverlaessigkeit || 0) + val, 0), 100);
        await _sb.from('lieferanten').update({ zuverlaessigkeit: n }).eq('id', id);
        fetchData();
    }

    async function updateRegelung(id, val) {
        await _sb.from('lieferanten').update({ regelung: val }).eq('id', id);
    }

    async function deletePartner(id) {
        if(confirm("Partner dauerhaft aus System entfernen?")) {
            await _sb.from('lieferanten').delete().eq('id', id);
            fetchData();
        }
    }

    async function deleteAvis(id) {
        if(confirm("Avisierung löschen?")) {
            await _sb.from('avisierung').delete().eq('id', id);
            fetchData();
        }
    }

    document.getElementById('admin-pw').onkeypress = (e) => e.key === 'Enter' && checkAccess();
</script>
</body>
</html>
