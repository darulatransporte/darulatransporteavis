<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darula Terminal | Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; font-family: 'Inter', sans-serif; color: #f8fafc; }
        .terminal-header { font-family: 'Orbitron', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .row-item { transition: all 0.2s ease; border-left: 4px solid transparent; }
        .row-item:hover { border-left-color: #3b82f6; background: rgba(30, 41, 59, 0.5); transform: translateX(5px); }
        .btn-action { transition: all 0.2s; }
        .btn-action:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="glass-panel p-8 rounded-[2.5rem] mb-10 flex flex-col md:flex-row justify-between items-center gap-6 shadow-2xl">
            <div class="text-center md:text-left">
                <h1 class="terminal-header text-4xl font-black italic uppercase tracking-tighter text-white">
                    Darula <span class="text-blue-500">Terminal</span>
                </h1>
                <p id="stats-info" class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-2 italic">Initialisiere Master-Access...</p>
            </div>
            
            <div class="flex gap-4">
                <button onclick="window.location.reload()" class="btn-action bg-slate-800 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase border border-slate-700 hover:bg-slate-700">Hard Reset</button>
                <button onclick="renderDashboard()" class="btn-action bg-blue-600 text-white px-10 py-3 rounded-2xl text-[10px] font-black uppercase shadow-xl shadow-blue-900/40 hover:bg-blue-500">Refresh Liste</button>
            </div>
        </header>

        <div id="data-container" class="space-y-3">
            <div class="text-center py-20 opacity-20 font-black uppercase tracking-[0.5em]">Lade Datenbank-Grid...</div>
        </div>
    </div>

    <script>
        // VERSCHLEIERUNG (Base64 kodiert)
        // URL: https://navhxyadbifllpopumfz.supabase.co
        const _v_u = "aHR0cHM6Ly9uYXZoeHlhZGJpbGxwb3B1bWZ6LnN1cGFiYXNlLmNv"; 
        // KEY: Dein Anon Key
        const _v_k = "ZXlKaGJHY2lPaUpTVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjeUk2SW5OMWNHRmlZWE5sSWl3aWNtVmlJam9pYm1Ga2VIaDVZV1JpYm1sbGJIeHdZWGwxYlhWbVpuWWlMQ0p5YjJ4bElqb2lZVzV2YmlJc0ltbGhkQ0k2TVRjM01qRXpOakkxTWl3aWVYYndJam95TURnM056RXlNanV6ZlEtMHVUQVlNZFJ4ZHZscFBkcFFtTUxxc3YxTWVuMXduQmZBeC1RNnpZ";

        const _client = supabase.createClient(atob(_v_u), atob(_v_k));

        async function renderDashboard() {
            const container = document.getElementById('data-container');
            const stats = document.getElementById('stats-info');
            
            // Holt ALLE Daten ohne Filter (Abwicklung rausgenommen)
            const { data, error } = await _client.from('avisierung').select('*').order('id', { ascending: false });

            if (error) {
                stats.innerHTML = `<span class="text-red-500 font-bold underline">FEHLER: ${error.message}</span>`;
                return;
            }

            stats.innerText = `${data.length} Aktive Avisierungen im System`;
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = `<div class="glass-panel p-20 rounded-[2rem] text-center text-slate-600 font-black uppercase italic tracking-widest">Keine Daten vorhanden</div>`;
                return;
            }

            data.forEach(entry => {
                container.innerHTML += `
                    <div class="glass-panel p-6 rounded-3xl row-item flex flex-col md:flex-row justify-between items-center gap-6 shadow-sm">
                        <div class="flex-1">
                            <div class="flex items-center gap-4 mb-3">
                                <span class="bg-blue-500/10 text-blue-500 font-black text-[10px] px-3 py-1 rounded-lg uppercase tracking-widest border border-blue-500/20">ID #${entry.id}</span>
                                <h3 class="text-2xl font-black text-white uppercase tracking-tighter">${entry.firma || 'Unbekannt'}</h3>
                            </div>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                                <div>
                                    <p class="text-[9px] uppercase text-slate-500 font-bold mb-1 tracking-widest">Bestellung (BE)</p>
                                    <p class="text-sm font-bold text-slate-200 font-mono">${entry.be_nummer || '---'}</p>
                                </div>
                                <div>
                                    <p class="text-[9px] uppercase text-slate-500 font-bold mb-1 tracking-widest">Einheiten</p>
                                    <p class="text-sm font-bold text-slate-200">${entry.palettes || '0'} Paletten</p>
                                </div>
                                <div>
                                    <p class="text-[9px] uppercase text-slate-500 font-bold mb-1 tracking-widest">Termin</p>
                                    <p class="text-sm font-bold text-blue-400 italic">${entry.liefer_datum || 'Offen'}</p>
                                </div>
                                <div>
                                    <p class="text-[9px] uppercase text-slate-500 font-bold mb-1 tracking-widest">Fahrzeug</p>
                                    <p class="text-sm font-bold text-slate-200">${entry.fahrzeug || 'Standard'}</p>
                                </div>
                            </div>
                        </div>

                        <button onclick="removeEntry(${entry.id})" class="btn-action bg-red-500/10 hover:bg-red-600 text-red-500 hover:text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] border border-red-500/20 shadow-lg shadow-red-900/10">
                            Entfernen
                        </button>
                    </div>
                `;
            });
        }

        async function removeEntry(id) {
            if (!confirm("Eintrag permanent löschen?")) return;
            
            const { error } = await _client.from('avisierung').delete().eq('id', id);
            
            if (error) {
                alert("Fehler beim Löschen: " + error.message);
            } else {
                renderDashboard();
            }
        }

        // Auto-Start
        renderDashboard();
        // Alle 30 Sek. Live-Refresh
        setInterval(renderDashboard, 30000);
    </script>
</body>
</html>
