<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darula Terminal | Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; font-family: 'Inter', sans-serif; color: #f8fafc; }
        .terminal-header { font-family: 'Orbitron', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .row-item { transition: all 0.2s ease; border-left: 4px solid transparent; }
        .row-item:hover { border-left-color: #3b82f6; background: rgba(30, 41, 59, 0.5); transform: translateX(5px); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="glass-panel p-8 rounded-[2.5rem] mb-10 flex flex-col md:flex-row justify-between items-center gap-6 shadow-2xl">
            <div class="text-center md:text-left">
                <h1 class="terminal-header text-4xl font-black italic uppercase tracking-tighter text-white">
                    Darula <span class="text-blue-500">Terminal</span>
                </h1>
                <p id="stats-info" class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em] mt-2 italic">Datenbank-Monitor aktiv</p>
            </div>
            <div class="flex gap-4">
                <button onclick="window.location.reload()" class="bg-slate-800 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase border border-slate-700 hover:bg-slate-700">Reload</button>
                <button onclick="renderDashboard()" class="bg-blue-600 text-white px-10 py-3 rounded-2xl text-[10px] font-black uppercase shadow-xl shadow-blue-900/40 hover:bg-blue-500">Refresh</button>
            </div>
        </header>

        <div id="data-container" class="space-y-3">
            <div class="text-center py-20 opacity-20 font-black uppercase tracking-[0.5em]">Verbinde mit Server...</div>
        </div>
    </div>

    <script>
        // VERSCHLEIERUNG (KORRIGIERT)
        // URL: https://navhxyadbifllpopumfz.supabase.co
        const _v_u = "aHR0cHM6Ly9uYXZoeHlhZGJpZmxscG9wdW1mei5zdXBhYmFzZS5jbw=="; 
        const _v_k = "ZXlKaGJHY2lPaUpTVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjeUk2SW5OMWNHRmlZWE5sSWl3aWNtVmlJam9pYm1Ga2VIaDVZV1JpYm1sbGJIeHdZWGwxYlhWbVpuWWlMQ0p5YjJ4bElqb2lZVzV2YmlJc0ltbGhkQ0k2TVRjM01qRXpOakkxTWl3aWVYYndJam95TURnM056RXlNanV6ZlEtMHVUQVlNZFJ4ZHZscFBkcFFtTUxxc3YxTWVuMXduQmZBeC1RNnpZ";

        const _client = supabase.createClient(atob(_v_u), atob(_v_k));

        async function renderDashboard() {
            const container = document.getElementById('data-container');
            const stats = document.getElementById('stats-info');
            
            // Holt einfach alles ohne Filter
            const { data, error } = await _client.from('avisierung').select('*').order('id', { ascending: false });

            if (error) {
                console.error("Netzwerkfehler:", error);
                stats.innerHTML = `<span class="text-red-500">Verbindungsfehler! Prüfe Internet oder API-Keys.</span>`;
                return;
            }

            stats.innerText = `${data.length} Einträge gefunden`;
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = `<div class="glass-panel p-20 rounded-3xl text-center opacity-40 uppercase tracking-widest font-black">Keine Avisierungen vorhanden</div>`;
                return;
            }

            data.forEach(entry => {
                container.innerHTML += `
                    <div class="glass-panel p-6 rounded-3xl row-item flex flex-col md:flex-row justify-between items-center gap-6 shadow-sm">
                        <div class="flex-1 text-center md:text-left">
                            <h3 class="text-2xl font-black text-white uppercase tracking-tighter mb-2">${entry.firma || 'Unbekannt'}</h3>
                            <div class="flex flex-wrap justify-center md:justify-start gap-4">
                                <span class="text-xs font-bold text-slate-400">BE: ${entry.be_nummer || '---'}</span>
                                <span class="text-xs font-bold text-blue-400">${entry.palettes || '0'} Paletten</span>
                                <span class="text-xs font-bold text-slate-400 italic">${entry.liefer_datum || 'Kein Datum'}</span>
                            </div>
                        </div>
                        <button onclick="removeEntry(${entry.id})" class="bg-red-500/10 hover:bg-red-600 text-red-500 hover:text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase border border-red-500/20 shadow-lg shadow-red-900/10">Löschen</button>
                    </div>
                `;
            });
        }

        async function removeEntry(id) {
            if (!confirm("Soll dieser LKW-Eintrag wirklich gelöscht werden?")) return;
            const { error } = await _client.from('avisierung').delete().eq('id', id);
            if (error) alert("Fehler beim Löschen: " + error.message);
            else renderDashboard();
        }

        // Start beim Laden
        renderDashboard();
    </script>
</body>
</html>
