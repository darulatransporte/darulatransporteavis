<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darula Admin | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; }
        .admin-card { background: white; border: 1px solid #e2e8f0; border-bottom: 6px solid #1e293b; border-radius: 12px; }
        .nav-link { font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; font-size: 11px; color: #64748b; }
        .login-overlay { 
            background: #0f172a; 
            position: fixed; 
            inset: 0; 
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .truck-row { border-left: 4px solid transparent; transition: all 0.2s; border-bottom: 1px solid #f1f5f9; }
        .truck-row:hover { border-left-color: #2563eb; background: #f8fafc; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <div id="loginPanel" class="login-overlay">
        <div class="max-w-md w-full p-8 bg-white rounded-2xl shadow-2xl border-b-8 border-blue-600 mx-4">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-900 uppercase italic tracking-tighter text-slate-900">Admin <span class="text-blue-600">Login</span></h2>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mt-2">Darula Transporte Intern</p>
            </div>
            
            <div class="space-y-4">
                <input type="password" id="passInput" placeholder="Passwort eingeben" 
                       class="w-full p-4 bg-slate-100 border border-slate-200 rounded-xl font-bold focus:outline-none focus:ring-2 focus:ring-blue-600 text-center text-lg">
                
                <button id="loginBtn" onclick="checkLogin()" 
                        class="w-full bg-blue-600 hover:bg-slate-900 text-white font-900 uppercase py-4 rounded-xl text-xs tracking-widest transition-all shadow-lg active:scale-95">
                    Terminal Entsperren →
                </button>
            </div>
            <p id="errorMsg" class="text-red-600 text-[10px] font-black uppercase mt-4 text-center hidden">⚠️ Passwort falsch!</p>
        </div>
    </div>

    <div id="mainContent" class="hidden flex-col min-h-screen">
        <nav class="bg-white border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
                <h1 class="text-2xl font-900 tracking-tighter uppercase italic text-slate-900">
                    Darula <span class="text-blue-600 not-italic">Terminal</span>
                </h1>
                <div class="flex gap-8">
                    <a href="index.html" class="nav-link hover:text-blue-600">Home</a>
                    <button onclick="location.reload()" class="nav-link text-red-600 underline">Logout</button>
                </div>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-6 py-12 w-full flex-grow">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 gap-6">
                <div>
                    <span class="text-[10px] font-900 text-blue-600 uppercase tracking-[0.3em] bg-blue-50 px-3 py-1 rounded">Logistik Hub Nürnberg</span>
                    <h2 class="text-5xl md:text-6xl font-900 uppercase italic tracking-tighter text-slate-900 mt-2 leading-none text-blue-600">Avisierungen</h2>
                </div>
                <button onclick="loadList()" class="bg-slate-900 text-white px-8 py-4 rounded-xl text-[10px] font-900 uppercase tracking-widest hover:bg-blue-600 transition-all shadow-xl">
                    Liste Aktualisieren
                </button>
            </div>

            <div class="admin-card overflow-hidden shadow-2xl">
                <div id="truckList">
                    <div class="p-20 text-center text-slate-400 font-bold uppercase italic tracking-widest">Daten werden geladen...</div>
                </div>
            </div>
        </main>

        <footer class="bg-white border-t py-8 text-center mt-12">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">&copy; 2026 Darula Transporte</p>
        </footer>
    </div>

    <script>
        // Supabase Client
        const _sb = supabase.createClient(
            "https://navhxyadbifllpopumfz.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdmh4eWFkYmlmbGxwb3B1bWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzYyNTIsImV4cCI6MjA4NzcxMjI1Mn0.-0uTAYMdR5rdXvlVpIdPqmMLqsv1Men1wnBfAx-Q6zY"
        );

        // Login Funktion
        function checkLogin() {
            const btn = document.getElementById('loginBtn');
            const pw = document.getElementById('passInput').value;
            const err = document.getElementById('errorMsg');
            
            // Visuelles Feedback beim Klicken
            btn.innerHTML = "Prüfe...";
            btn.classList.add('opacity-50');

            setTimeout(() => {
                if (pw === "alurad2026") {
                    document.getElementById('loginPanel').classList.add('hidden');
                    document.getElementById('mainContent').classList.remove('hidden');
                    loadList();
                } else {
                    btn.innerHTML = "Terminal Entsperren →";
                    btn.classList.remove('opacity-50');
                    err.classList.remove('hidden');
                    document.getElementById('passInput').value = "";
                }
            }, 400); // Kurze Verzögerung für das Gefühl der Sicherheit
        }

        // Enter-Taste
        document.getElementById('passInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkLogin();
        });

        // Daten laden
        async function loadList() {
            const { data, error } = await _sb
                .from('avisierung')
                .select('*')
                .order('id', { ascending: false });

            const container = document.getElementById('truckList');
            
            if (error) {
                container.innerHTML = `<div class="p-10 text-red-500 font-bold text-center">Fehler beim Laden: ${error.message}</div>`;
                return;
            }

            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<div class="p-20 text-center text-slate-400 font-bold uppercase italic tracking-widest text-xs">Keine Einträge vorhanden</div>';
                return;
            }

            data.forEach(item => {
                const dateObj = new Date(item.created_at);
                const formattedDate = dateObj.toLocaleDateString('de-DE', {
                    day: '2-digit', month: '2-digit', year: 'numeric'
                });

                container.innerHTML += `
                    <div class="truck-row bg-white p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div class="flex-grow">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="w-3 h-3 bg-blue-600 rounded-sm rotate-45"></span>
                                <div class="font-900 text-slate-900 uppercase text-2xl italic tracking-tighter">${item.firma || 'UNBEKANNT'}</div>
                            </div>
                            <div class="flex gap-6 items-center">
                                <div class="text-[11px] font-black text-slate-400 uppercase tracking-widest">BE-NR: <span class="text-slate-900">${item.be_nummer || '-'}</span></div>
                                <div class="text-[11px] font-black text-slate-400 uppercase tracking-widest">DATUM: <span class="text-blue-600">${formattedDate}</span></div>
                            </div>
                        </div>
                        <button onclick="deleteTruck(${item.id})" class="w-full md:w-auto bg-red-50 text-red-600 hover:bg-red-600 hover:text-white px-8 py-4 rounded-xl text-[10px] font-900 uppercase tracking-widest transition-all active:scale-95">
                            Löschen
                        </button>
                    </div>
                `;
            });
        }

        // Löschen
        async function deleteTruck(id) {
            if (!confirm("Eintrag unwiderruflich löschen?")) return;

            const { error } = await _sb
                .from('avisierung')
                .delete()
                .eq('id', id);

            if (error) {
                alert("Fehler: " + error.message);
            } else {
                loadList();
            }
        }
    </script>
</body>
</html>
