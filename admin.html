<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Darula Admin | Browser Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-4 md:p-10 font-sans">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <h1 class="text-2xl font-black uppercase italic tracking-tighter text-slate-900">Darula <span class="text-blue-600">Terminal</span></h1>
            <button onclick="window.location.reload()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-xs font-bold uppercase hover:bg-slate-900 transition-all shadow-lg">Seite Neu Laden</button>
        </header>

        <div id="status" class="text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Live-Daten von Supabase...</div>
        <div id="truckList" class="space-y-4"></div>
    </div>

    <script>
        const _sb = supabase.createClient(
            "https://navhxyadbifllpopumfz.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdmh4eWFkYmlmbGxwb3B1bWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzYyNTIsImV4cCI6MjA4NzcxMjI1Mn0.-0uTAYMdR5rdXvlVpIdPqmMLqsv1Men1wnBfAx-Q6zY"
        );

        async function loadList() {
            // Wir fügen eine zufällige Zahl hinzu, damit der Browser nicht aus dem Cache lädt
            const { data, error } = await _sb
                .from('avisierung')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                console.error("Fehler:", error);
                return;
            }

            const container = document.getElementById('truckList');
            container.innerHTML = '';

            data.forEach(item => {
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                        <div>
                            <div class="font-black text-slate-800 uppercase text-lg">${item.firma || 'Unbekannt'}</div>
                            <div class="text-[11px] font-bold text-slate-400 uppercase mt-1">BE: ${item.be_nummer || '-'}</div>
                        </div>
                        <button onclick="deleteTruck(${item.id})" class="bg-red-50 text-red-600 hover:bg-red-600 hover:text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase transition-all shadow-sm">
                            Löschen
                        </button>
                    </div>
                `;
            });
        }

        async function deleteTruck(id) {
            if (!confirm("Eintrag löschen?")) return;

            const { error } = await _sb
                .from('avisierung')
                .delete()
                .eq('id', id);

            if (error) {
                alert("Fehler im Browser: " + error.message);
            } else {
                // Nach dem Löschen laden wir die Liste neu
                loadList();
            }
        }

        // Automatisch alle 5 Sekunden aktualisieren, falls im Browser nichts passiert
        setInterval(loadList, 5000);
        loadList();
    </script>
</body>
</html>
