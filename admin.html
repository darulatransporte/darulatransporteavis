<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darula Logistik | Admin-Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .table-container { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-900 uppercase italic tracking-tighter">Admin <span class="text-blue-600">Übersicht</span></h1>
                <p class="text-slate-500 font-bold text-xs uppercase tracking-widest mt-1">Eingehende Avisierungen</p>
            </div>
            <button onclick="fetchData()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold text-sm hover:bg-blue-700 transition">Aktualisieren</button>
        </header>

        <div class="table-container">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-100 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                        <th class="p-6">Datum</th>
                        <th class="p-6">Firma</th>
                        <th class="p-6">Paletten</th>
                        <th class="p-6">Typ</th>
                        <th class="p-6">BE-Nummer</th>
                        <th class="p-6">Status</th>
                        <th class="p-6 text-right">Aktion</th>
                    </tr>
                </thead>
                <tbody id="data-body" class="divide-y divide-slate-50">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Supabase Konfiguration
        const supabaseUrl = "https://navhxyadbifllpopumfz.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdmh4eWFkYmlmbGxwb3B1bWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzYyNTIsImV4cCI6MjA4NzcxMjI1Mn0.-0uTAYMdR5rdXvlVpIdPqmMLqsv1Men1wnBfAx-Q6zY";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function fetchData() {
            const { data, error } = await _supabase
                .from('avisierung')
                .select('*')
                .order('liefer_datum', { ascending: true });

            if (error) {
                console.error('Fehler:', error);
                return;
            }

            const tbody = document.getElementById('data-body');
            tbody.innerHTML = '';

            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                
                const statusColor = row.status === 'archiv' ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700';

                tr.innerHTML = `
                    <td class="p-6 font-bold text-slate-700">${row.liefer_datum}</td>
                    <td class="p-6 font-black uppercase italic text-blue-600">${row.firma}</td>
                    <td class="p-6 font-bold">${row.palettes}</td>
                    <td class="p-6 text-slate-500 text-sm font-medium">${row.fahrzeug_typ}</td>
                    <td class="p-6 font-mono text-xs text-slate-400">${row.be_nummer}</td>
                    <td class="p-6">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${statusColor}">
                            ${row.status}
                        </span>
                    </td>
                    <td class="p-6 text-right">
                        <button onclick="deleteEntry('${row.id}')" class="text-red-400 hover:text-red-600 font-bold text-xs uppercase">Löschen</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function deleteEntry(id) {
            if (confirm('Möchten Sie diesen Eintrag wirklich löschen?')) {
                const { error } = await _supabase
                    .from('avisierung')
                    .delete()
                    .eq('id', id);

                if (!error) fetchData();
            }
        }

        // Initiales Laden
        fetchData();
    </script>
</body>
</html>
