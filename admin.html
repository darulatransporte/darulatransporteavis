<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darula Logistik | Admin-Zentrale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .table-container { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        .hidden-content { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center">
            <div class="bg-blue-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center font-900 italic mx-auto mb-6 shadow-lg shadow-blue-500/30">D</div>
            <h2 class="text-2xl font-900 uppercase italic tracking-tighter mb-2">Admin Login</h2>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-8">Eingeschränkter Bereich</p>
            
            <input type="password" id="admin-pw" placeholder="Passwort eingeben" 
                class="w-full p-4 bg-slate-100 border-2 border-transparent focus:border-blue-600 rounded-2xl outline-none font-bold text-center mb-4 transition-all">
            
            <button onclick="checkAccess()" class="w-full bg-blue-600 hover:bg-slate-900 text-white py-4 rounded-2xl font-900 uppercase italic transition-all">Einloggen</button>
            <p id="error-msg" class="text-red-500 text-[10px] font-black uppercase mt-4 hidden">Zugriff verweigert</p>
        </div>
    </div>

    <div id="admin-content" class="max-w-7xl mx-auto hidden-content">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 gap-6">
            <div>
                <h1 class="text-6xl font-900 uppercase italic tracking-tighter leading-none">Dispatcher <span class="text-blue-600">Zentrale</span></h1>
                <p class="text-slate-400 font-bold text-xs uppercase tracking-widest mt-4 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> System Live / Gesichert
                </p>
            </div>
            <div class="flex gap-3">
                <button onclick="logout()" class="bg-white text-slate-400 border border-slate-200 px-6 py-3 rounded-xl font-bold text-xs uppercase hover:bg-slate-50 transition">Logout</button>
                <button onclick="fetchData()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-black text-xs uppercase italic tracking-widest shadow-lg shadow-blue-500/20 hover:bg-slate-900 transition-all">Aktualisieren</button>
            </div>
        </header>

        <div class="table-container border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                            <th class="p-8">Datum (ETA)</th>
                            <th class="p-8">Partner / Spedition</th>
                            <th class="p-8 text-center">Einheiten</th>
                            <th class="p-8">Referenz (BE)</th>
                            <th class="p-8">Status</th>
                            <th class="p-8 text-right">Steuerung</th>
                        </tr>
                    </thead>
                    <tbody id="data-body" class="divide-y divide-slate-50 font-medium">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Sicherheits-Konfiguration
        const MASTER_PW = "Sommer2026"; // Ändere dein Passwort hier!
        
        // Supabase Verbindung
        const SB_URL = "https://navhxyadbifllpopumfz.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdmh4eWFkYmlmbGxwb3B1bWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzYyNTIsImV4cCI6MjA4NzcxMjI1Mn0.-0uTAYMdR5rdXvlVpIdPqmMLqsv1Men1wnBfAx-Q6zY";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        // Zugangsprüfung
        function checkAccess() {
            const input = document.getElementById('admin-pw').value;
            if(input === MASTER_PW) {
                sessionStorage.setItem('darula_auth', 'true');
                unlockUI();
            } else {
                const err = document.getElementById('error-msg');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 2000);
            }
        }

        function unlockUI() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden-content');
            fetchData();
        }

        function logout() {
            sessionStorage.removeItem('darula_auth');
            location.reload();
        }

        // Automatische Prüfung beim Laden
        if(sessionStorage.getItem('darula_auth') === 'true') {
            unlockUI();
        }

        // Datenverwaltung
        async function fetchData() {
            const { data, error } = await _sb
                .from('avisierung')
                .select('*')
                .order('liefer_datum', { ascending: true });

            if (error) return;

            const tbody = document.getElementById('data-body');
            tbody.innerHTML = '';

            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50/50 transition-colors group";
                
                const isArchiv = row.status === 'archiv';
                const statusBadge = isArchiv 
                    ? 'bg-emerald-100 text-emerald-600 border border-emerald-200' 
                    : 'bg-blue-100 text-blue-600 border border-blue-200';

                tr.innerHTML = `
                    <td class="p-8 font-black text-slate-700 italic text-xl">${row.liefer_datum}</td>
                    <td class="p-8 font-900 uppercase italic text-blue-600 tracking-tighter">
                        ${row.firma}
                        <div class="text-[9px] text-slate-400 font-bold tracking-widest mt-1">${row.fahrzeug_typ}</div>
                    </td>
                    <td class="p-8 text-center font-black text-slate-900">${row.palettes} <span class="text-[10px] text-slate-400">PAL</span></td>
                    <td class="p-8">
                        <span class="font-mono text-xs bg-slate-100 px-3 py-1 rounded-md text-slate-500">${row.be_nummer}</span>
                    </td>
                    <td class="p-8">
                        <span class="px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest ${statusBadge}">
                            ${row.status}
                        </span>
                    </td>
                    <td class="p-8 text-right">
                        <button onclick="deleteRow('${row.id}')" class="text-slate-300 hover:text-red-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function deleteRow(id) {
            if (confirm('Eintrag unwiderruflich löschen?')) {
                const { error } = await _sb.from('avisierung').delete().eq('id', id);
                if (!error) fetchData();
            }
        }

        // Enter-Taste für Login
        document.getElementById('admin-pw').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') checkAccess();
        });
    </script>
</body>
</html>
