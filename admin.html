<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Darula Admin | Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .row-card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .row-card:hover { border-color: #2563eb; transform: scale(1.005); }
    </style>
</head>
<body class="antialiased">

    <div id="login" class="fixed inset-0 bg-slate-900 z-[9999] flex items-center justify-center p-6">
        <div class="bg-white p-12 rounded-[3rem] w-full max-w-md shadow-2xl text-center">
            <h2 class="text-3xl font-900 uppercase italic mb-8">Admin <span class="text-blue-600">Access</span></h2>
            <input type="password" id="pw" placeholder="Security Key" class="w-full p-5 bg-slate-100 rounded-2xl mb-4 font-bold outline-none border-2 border-transparent focus:border-blue-600">
            <button onclick="unlock()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-900 uppercase text-xs tracking-[0.2em]">Unlock</button>
        </div>
    </div>

    <div id="panel" class="hidden">
        <nav class="bg-white border-b border-slate-200 p-6 sticky top-0 z-50 flex justify-between items-center">
            <h1 class="text-xl font-900 uppercase italic">Darula <span class="text-blue-600">Admin</span></h1>
            <div class="flex gap-4">
                <input type="text" id="srch" onkeyup="draw()" placeholder="Suche..." class="bg-slate-100 rounded-xl px-5 py-2.5 text-xs font-bold outline-none border-2 border-transparent focus:border-blue-600">
                <button onclick="location.reload()" class="text-[10px] font-900 uppercase text-red-500">Logout</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-6 py-10">
            <div class="flex justify-between items-end mb-10">
                <h2 class="text-5xl font-900 uppercase italic tracking-tighter">Lieferplan</h2>
                <div class="flex gap-4 items-center">
                    <span class="text-[10px] font-900 uppercase text-slate-400 tracking-widest">Live Sync</span>
                    <button onclick="load()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-900 text-[10px] uppercase tracking-widest">Refresh</button>
                </div>
            </div>

            <div id="list" class="space-y-4"></div>
        </main>
    </div>

<script>
    const _sb = supabase.createClient("https://navhxyadbifllpopumfz.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdmh4eWFkYmlmbGxwb3B1bWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzYyNTIsImV4cCI6MjA4NzcxMjI1Mn0.-0uTAYMdR5rdXvlVpIdPqmMLqsv1Men1wnBfAx-Q6zY");
    let items = [];

    function unlock() {
        if(document.getElementById('pw').value === "alurad2026") {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('panel').classList.remove('hidden');
            load();
        }
    }

    async function load() {
        const { data } = await _sb.from('avisierung').select('*').order('liefer_datum', { ascending: false });
        items = data || [];
        draw();
    }

    function draw() {
        const box = document.getElementById('list');
        const q = document.getElementById('srch').value.toLowerCase();
        box.innerHTML = '';

        items.filter(i => i.firma?.toLowerCase().includes(q) || i.be_nummer?.includes(q)).forEach(i => {
            const card = document.createElement('div');
            card.className = 'row-card p-6 grid grid-cols-1 md:grid-cols-12 gap-6 items-center';
            card.innerHTML = `
                <div class="md:col-span-3">
                    <p class="text-[9px] font-black text-blue-600 uppercase tracking-widest mb-1">Spedition</p>
                    <p class="font-900 text-slate-900 uppercase italic text-lg">${i.firma}</p>
                </div>
                <div class="md:col-span-2">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Datum</p>
                    <p class="font-bold text-slate-700">${new Date(i.liefer_datum).toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'2-digit'})}</p>
                </div>
                <div class="md:col-span-2">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Ladung</p>
                    <p class="text-xs font-bold">${i.palettes} Paletten / ${i.fahrzeug_typ}</p>
                </div>
                <div class="md:col-span-3">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Referenzen</p>
                    <p class="text-[11px] font-mono bg-slate-100 p-2 rounded-lg">BE: ${i.be_nummer} | ART: ${i.artikel_nr}</p>
                </div>
                <div class="md:col-span-2 flex justify-end">
                    <button onclick="del(${i.id})" class="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white p-4 rounded-2xl transition-all">
                        Löschen
                    </button>
                </div>
            `;
            box.appendChild(card);
        });
    }

    async function del(id) {
        if(confirm("Eintrag entfernen?")) {
            await _sb.from('avisierung').delete().eq('id', id);
            load();
        }
    }
</script>
</body>
</html>
