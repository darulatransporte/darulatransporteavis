<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darula Admin | Final Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, sans-serif; background-color: #f8fafc; }
        .truck-card { transition: all 0.2s ease; }
        .truck-card:hover { border-color: #cbd5e1; transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 md:p-10 text-slate-900">

    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black uppercase italic tracking-tighter">Darula <span class="text-blue-600">Terminal</span></h1>
                <p id="counter" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Verbinde zur Datenbank...</p>
            </div>
            <button onclick="loadList()" class="w-full md:w-auto bg-slate-900 text-white px-8 py-3 rounded-2xl text-xs font-bold uppercase shadow-lg hover:bg-blue-600 active:scale-95 transition-all">
                Aktualisieren
            </button>
        </header>

        <div id="listContainer" class="space-y-4">
            </div>
    </div>

    <script>
        // Deine Supabase Zugangsdaten
        const SB_URL = "https://navhxyadbifllpopumfz.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdmh4eWFkYmlmbGxwb3B1bWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzYyNTIsImV4cCI6MjA4NzcxMjI1Mn0.-0uTAYMdR5rdXvlVpIdPqmMLqsv1Men1wnBfAx-Q6zY";
        
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        async function loadList() {
            const counterEl = document.getElementById('counter');
            const container = document.getElementById('listContainer');
            
            counterEl.innerText = "Lade Daten...";
            
            // Hole alle Daten aus der Tabelle 'avisierung'
            const { data, error } = await _sb
                .from('avisierung')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                counterEl.innerHTML = `<span class="text-red-500 underline">Fehler beim Laden: ${error.message}</span>`;
                return;
            }

            counterEl.innerText = `${data.length} LKWs in der Liste`;
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="bg-white p-20 rounded-3xl text-center border-2 border-dashed border-slate-200">
                        <p class="text-slate-400 font-bold uppercase italic tracking-widest">Keine aktuellen Einträge</p>
                    </div>`;
                return;
            }

            data.forEach(truck => {
                container.innerHTML += `
                    <div class="truck-card bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="text-center md:text-left">
                            <div class="font-black text-slate-800 uppercase text-xl leading-tight tracking-tight">${truck.firma || 'Unbekannt'}</div>
                            <div class="flex flex-wrap justify-center md:justify-start gap-4 text-[11px] font-bold text-slate-400 uppercase mt-2 tracking-wider">
                                <span>BE: <span class="text-slate-900">${truck.be_nummer || '-'}</span></span>
                                <span>Paletten: <span class="text-slate-900">${truck.palettes || '0'}</span></span>
                                <span>Datum: <span class="text-slate-900">${truck.liefer_datum || '-'}</span></span>
                            </div>
                        </div>

                        <button onclick="deleteTruck(${truck.id})" class="bg-red-50 text-red-600 hover:bg-red-600 hover:text-white px-8 py-4 rounded-2xl font-black uppercase text-[10px] tracking-[0.1em] transition-all shadow-sm active:scale-95 border border-red-100">
                            Entfernen
                        </button>
                    </div>
                `;
            });
        }

        async function deleteTruck(id) {
            // Sicherheitsabfrage
            if (!confirm("Diesen LKW wirklich aus der Liste löschen?")) return;

            // Löschbefehl an Supabase senden
            const { error } = await _sb
                .from('avisierung')
                .delete()
                .eq('id', id);

            if (error) {
                alert("Löschen fehlgeschlagen: " + error.message);
            } else {
                // Liste sofort neu laden
                loadList();
            }
        }

        // Initiale Ladung beim Öffnen der Seite
        loadList();
    </script>
</body>
</html>
