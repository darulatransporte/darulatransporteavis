<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Darula Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f1f5f9; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #3b82f6; }
        .done { border-left-color: #22c55e; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="login" class="max-w-sm mx-auto mt-20 bg-white p-6 rounded shadow">
        <input type="password" id="pw" class="w-full border p-2 mb-4" placeholder="Passwort">
        <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded">Login</button>
    </div>

    <div id="main" class="hidden max-w-4xl mx-auto">
        <div class="flex justify-between mb-4">
            <h1 class="font-bold text-xl uppercase">Terminal Steuerung</h1>
            <button onclick="load()" class="bg-gray-800 text-white px-4 py-1 rounded text-sm">Refresh</button>
        </div>
        <div id="liste"></div>
    </div>

    <script>
        const _sb = supabase.createClient("https://navhxyadbifllpopumfz.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdmh4eWFkYmlmbGxwb3B1bWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzYyNTIsImV4cCI6MjA4NzcxMjI1Mn0.-0uTAYMdR5rdXvlVpIdPqmMLqsv1Men1wnBfAx-Q6zY");

        function login() {
            if(document.getElementById('pw').value === "darula") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('main').classList.remove('hidden');
                load();
            }
        }

        async function load() {
            const { data } = await _sb.from('avisierung').select('*').order('id', {ascending: false});
            const container = document.getElementById('liste');
            container.innerHTML = '';
            data.forEach(item => {
                const isDone = item.status === 'abgewickelt';
                container.innerHTML += `
                    <div class="card ${isDone ? 'done' : ''}">
                        <div>
                            <div class="font-bold">${item.firma}</div>
                            <div class="text-xs text-gray-500">BE: ${item.be_nummer} | Status: ${item.status}</div>
                        </div>
                        <div class="flex gap-2">
                            ${!isDone ? `<button onclick="done(${item.id})" class="bg-blue-500 text-white px-3 py-1 rounded text-xs">Abwickeln</button>` : '<span class="text-green-600 font-bold">✓</span>'}
                            <button onclick="del(${item.id})" class="bg-red-500 text-white px-3 py-1 rounded text-xs">Löschen</button>
                        </div>
                    </div>`;
            });
        }

        async function done(id) {
            await _sb.from('avisierung').update({ status: 'abgewickelt' }).eq('id', id);
            load();
        }

        async function del(id) {
            if(confirm("Löschen?")) {
                await _sb.from('avisierung').delete().eq('id', id);
                load();
            }
        }
    </script>
</body>
</html>
