<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Darula Admin | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f1f5f9; }
        .admin-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 5px solid #cbd5e1; display: flex; justify-content: space-between; align-items: center; }
        .card-done { border-left-color: #22c55e; opacity: 0.6; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="loginOverlay" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-2xl shadow-xl text-center">
            <h2 class="text-xl font-bold mb-4">ADMIN LOGIN</h2>
            <input type="password" id="pass" class="border-2 p-3 rounded-lg mb-4 w-full text-center" placeholder="Passwort">
            <button onclick="check()" class="bg-blue-600 text-white w-full py-3 rounded-lg font-bold">STARTEN</button>
        </div>
    </div>

    <div id="content" class="hidden p-4 max-w-4xl mx-auto">
        <div class="flex justify-between mb-6">
            <h1 class="font-bold">DARULA TERMINAL</h1>
            <button onclick="load()" class="bg-slate-800 text-white px-4 py-1 rounded text-sm">REFRESH</button>
        </div>
        <div id="list">Lade Daten...</div>
    </div>

    <script>
        const _sb = supabase.createClient(
            "https://navhxyadbifllpopumfz.supabase.co", 
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdmh4eWFkYmlmbGxwb3B1bWZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzYyNTIsImV4cCI6MjA4NzcxMjI1Mn0.-0uTAYMdR5rdXvlVpIdPqmMLqsv1Men1wnBfAx-Q6zY"
        );

        function check() {
            if(document.getElementById('pass').value === "darula") {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('content').classList.remove('hidden');
                load();
            } else { alert("Falsch!"); }
        }

        async function load() {
            const { data, error } = await _sb.from('avisierung').select('*').order('id', {ascending: false});
            if(error) { console.error(error); return; }
            
            let html = '';
            data.forEach(item => {
                const isDone = item.status === 'abgewickelt';
                html += `
                    <div class="admin-card ${isDone ? 'card-done' : ''}">
                        <div>
                            <div class="font-bold">${item.firma}</div>
                            <div class="text-xs text-slate-500">BE: ${item.be_nummer} | Status: ${item.status}</div>
                        </div>
                        <div class="flex gap-2">
                            ${!isDone ? `<button onclick="done(${item.id})" class="bg-green-500 text-white px-3 py-2 rounded text-xs font-bold">ABWICKELN</button>` : '<span class="text-green-600 font-bold">ERLEDIGT</span>'}
                            <button onclick="del(${item.id})" class="bg-red-100 text-red-600 px-3 py-2 rounded text-xs">LÖSCHEN</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('list').innerHTML = html;
        }

        async function done(id) {
            const { error } = await _sb.from('avisierung').update({ status: 'abgewickelt' }).eq('id', id);
            if(error) alert("Fehler: " + error.message);
            load();
        }

        async function del(id) {
            if(!confirm("Löschen?")) return;
            const { error } = await _sb.from('avisierung').delete().eq('id', id);
            if(error) alert("Fehler: " + error.message);
            load();
        }
    </script>
</body>
</html>
